<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>과자 먹기 게임</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <style>
    body { 
      background-color: #fff0f5; 
      font-family: 'Malgun Gothic', sans-serif; 
      margin: 0;
      padding-top: 40px; 
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    h1 { 
      color: #ff69b4; 
      margin: 0 0 10px 0; 
      font-size: 48px; /* 칠판용으로 크기 대폭 상향 */
    }
    p { 
      color: #555; 
      font-size: 24px; /* 안내 문구도 큼직하게 */
      margin: 0; 
      font-weight: bold;
    }

    .main-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px; 
      flex-wrap: wrap;
      width: 95%; /* 전체 화면 너비 활용 */
      max-width: 1400px;
    }

    /* --- 왼쪽: 게임 컨테이너 --- */
    #game-container {
      position: relative;
      display: flex;
      justify-content: center;
      flex: 1;
      min-width: 640px;
    }
    
    /* 여기서 해상도는 유지하되 화면에 꽉 차게 비율을 늘려줌 */
    canvas { 
      border: 8px solid #ffb6c1; 
      border-radius: 15px; 
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
      display: block; 
      width: 100%; 
      max-width: 960px; /* 칠판에서 보기 좋은 최대 크기 */
      height: auto;
    }
    
    /* --- 오른쪽: 랭킹 게시판 --- */
    #scoreboard-container {
      background-color: white;
      border: 8px solid #ffd700; 
      border-radius: 15px;
      width: 320px; /* 칠판 비율에 맞게 살짝 더 키움 */
      min-height: 480px; 
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
      padding: 25px;
      box-sizing: border-box;
    }

    .score-guide {
      background-color: #fff0f5;
      border: 2px dashed #ff69b4;
      border-radius: 10px;
      padding: 20px 10px;
      margin-bottom: 25px;
      text-align: center;
      font-weight: bold;
      color: #333;
      line-height: 1.6;
      font-size: 20px;
    }
    .score-guide .title {
      color: #ff1493;
      font-size: 24px;
      margin-bottom: 10px;
      display: block;
    }

    #scoreboard-container h2 {
      color: #ff1493;
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 30px;
      border-bottom: 3px dashed #ffb6c1;
      padding-bottom: 10px;
    }
    #ranking-list {
      list-style: none; 
      padding: 0;
      margin: 0;
      font-size: 22px;
      font-weight: bold;
      color: #333;
    }
    #ranking-list li {
      padding: 15px 0;
      border-bottom: 1px solid #eee;
    }
    #ranking-list li.rank-1 { color: #ff1493; font-size: 28px; }
    #ranking-list li.rank-2 { color: #ff8c00; font-size: 26px; }
    #ranking-list li.rank-3 { color: #32cd32; font-size: 24px; }
    
    #start-screen, #game-over-screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: none; 
      z-index: 10;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 80%;
      max-width: 500px;
    }
    
    /* 애들 터치하기 편하게 존나 크게 만듦 */
    #player-name {
      font-size: 36px; 
      padding: 15px;
      text-align: center;
      border: 4px solid #ffb6c1;
      border-radius: 15px;
      width: 80%;
      outline: none;
    }
    .btn {
      background-color: #ff69b4;
      color: white;
      font-size: 32px;
      font-weight: bold;
      padding: 20px 40px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 6px 8px rgba(0,0,0,0.2);
      width: 100%;
    }
    .btn:hover { background-color: #ff1493; }

    #game-over-screen h2 {
      color: #ff1493; 
      font-size: 42px; 
      margin-top: 0;
    }
    #final-score-text {
      font-size: 32px; 
      color: #333; 
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>아~ 해봐! 과자 먹기 게임 🍪</h1>
    <p>제한 시간 30초! 오른쪽 명예의 전당 1위를 노려보세요!</p>
  </div>

  <div class="main-wrapper">
    <div id="game-container">
      <div id="start-screen">
        <h2 style="margin: 0; color: #ff1493;">이름을 적어주세요!</h2>
        <input type="text" id="player-name" placeholder="내 이름">
        <button class="btn" onclick="startGame()">▶ 게임 시작!</button>
      </div>

      <div id="game-over-screen">
        <h2>⏰ 타임 오버!</h2>
        <p id="final-score-text"></p>
        <button class="btn" onclick="resetToStart()">다시 하기</button>
      </div>
    </div>

    <div id="scoreboard-container">
      <div class="score-guide">
        <span class="title">🎯 점수 안내</span>
        <span style="font-size: 28px; vertical-align: middle;">🍪</span> 왕 쿠키 : <span style="color: #ff1493;">5점</span><br>
        <span style="font-size: 20px; vertical-align: middle;">🍪</span> 꼬마 쿠키 : <span style="color: #ff8c00;">3점</span>
      </div>

      <h2>🏆 명예의 전당 🏆</h2>
      <ul id="ranking-list">
        <li style="color: #999; text-align: center; border: none; padding-top: 20px;">
          아직 기록이 없어요!<br>첫 번째 도전에 나서세요!
        </li>
      </ul>
    </div>
  </div>

  <script>
    let video;
    let facemesh;
    let predictions = [];
    let snack = { x: 300, y: -100, size: 50, speed: 2, points: 3 }; 
    
    let score = 0;
    let gameState = 'loading'; 
    let playerName = "";
    let leaderboard = []; 
    
    let timeLeft = 30;
    let lastTimeCheck = 0;

    function setup() {
      let canvas = createCanvas(640, 480);
      canvas.parent('game-container'); 

      video = createCapture(VIDEO);
      video.size(width, height);
      
      facemesh = ml5.facemesh(video, modelReady);
      facemesh.on('predict', results => { predictions = results; });
      video.hide();
    }

    function modelReady() {
      gameState = 'ready'; 
      document.getElementById('start-screen').style.display = 'flex'; 
    }

    function startGame() {
      let nameInput = document.getElementById('player-name').value;
      if (nameInput.trim() === "") {
        alert("이름을 꼭 적어주세요!"); 
        return;
      }
      playerName = nameInput; 
      score = 0;             
      timeLeft = 30;         
      lastTimeCheck = millis(); 
      
      document.getElementById('start-screen').style.display = 'none'; 
      gameState = 'playing'; 
      resetSnack(); 
    }

    function resetToStart() {
      document.getElementById('game-over-screen').style.display = 'none';
      document.getElementById('player-name').value = ""; 
      gameState = 'ready';
      document.getElementById('start-screen').style.display = 'flex';
    }

    function endGame() {
      gameState = 'gameover';
      
      leaderboard.push({ name: playerName, score: score });
      leaderboard.sort((a, b) => b.score - a.score);
      
      updateScoreboardUI();

      document.getElementById('final-score-text').innerText = `${playerName}님의 점수: ${score}점!`;
      document.getElementById('game-over-screen').style.display = 'flex';
    }

    function updateScoreboardUI() {
      let listHTML = "";
      let displayCount = min(10, leaderboard.length); 

      for (let i = 0; i < displayCount; i++) {
        let rankClass = "";
        if (i === 0) rankClass = "rank-1";
        else if (i === 1) rankClass = "rank-2";
        else if (i === 2) rankClass = "rank-3";

        listHTML += `<li class="${rankClass}">${i + 1}등: ${leaderboard[i].name} (${leaderboard[i].score}점)</li>`;
      }

      document.getElementById('ranking-list').innerHTML = listHTML;
    }

    function draw() {
      background(255);

      push();
      translate(width, 0);
      scale(-1, 1);
      image(video, 0, 0, width, height);
      pop();

      if (gameState === 'loading') {
        drawOverlayText('카메라를 준비하고 있어요... ⏳');
      } 
      else if (gameState === 'ready') {
        drawOverlayText('게임을 시작할 준비가 되었습니다!👆');
      } 
      else if (gameState === 'playing') {
        if (millis() - lastTimeCheck >= 1000) {
          timeLeft--;
          lastTimeCheck = millis();
        }

        if (timeLeft <= 0) {
          endGame();
        } else {
          drawSnack();
          checkCollision();
          drawScoreAndTimer();
        }
      } 
      else if (gameState === 'gameover') {
        fill(0, 150);
        rect(0, 0, width, height);
      }
    }

    function drawOverlayText(msg) {
      fill(0, 150);
      rect(0, 0, width, height);
      fill(255);
      textAlign(CENTER, CENTER);
      textSize(30);
      text(msg, width/2, height/2 + 100);
    }

    function drawSnack() {
      snack.y += snack.speed; 
      if (snack.y > height) { resetSnack(); }
      
      fill(210, 105, 30); 
      noStroke();
      circle(snack.x, snack.y, snack.size);
      
      let offset = snack.size * 0.2; 
      fill(101, 67, 33);
      circle(snack.x - offset, snack.y - offset, snack.size * 0.2);
      circle(snack.x + offset*1.2, snack.y - offset*0.4, snack.size * 0.24);
      circle(snack.x - offset*0.6, snack.y + offset*1.2, snack.size * 0.2);
      circle(snack.x + offset*0.8, snack.y + offset, snack.size * 0.16);
    }

    function resetSnack() {
      snack.y = -80; 
      snack.x = random(50, width - 50);
      snack.speed = random(1.5, 3.5); 

      if (random(1) > 0.5) {
        snack.size = 80;   snack.points = 5;  
      } else {
        snack.size = 45;   snack.points = 3;  
      }
    }

    function checkCollision() {
      if (predictions.length > 0) {
        let keypoints = predictions[0].scaledMesh;
        let upperLip = keypoints[13];
        let lowerLip = keypoints[14];
        
        let rawMouthX = (upperLip[0] + lowerLip[0]) / 2;
        let mouthCenterX = width - rawMouthX; 
        let mouthCenterY = (upperLip[1] + lowerLip[1]) / 2;
        let mouthOpenAmount = lowerLip[1] - upperLip[1];
        let d = dist(snack.x, snack.y, mouthCenterX, mouthCenterY);
        
        if (d < (snack.size / 2) + 40 && mouthOpenAmount > 15) {
          score += snack.points; 
          resetSnack(); 
        }
      }
    }

    function drawScoreAndTimer() {
      fill(255);
      stroke(255, 105, 180);
      strokeWeight(4);
      textSize(30);
      
      textAlign(LEFT, TOP);
      text('도전자: ' + playerName, 20, 20);
      text('점수: ' + score + '점', 20, 60);
      
      textAlign(RIGHT, TOP);
      if(timeLeft <= 10 && timeLeft % 2 === 0) { stroke(255, 0, 0); } 
      else { stroke(255, 165, 0); }
      text('남은 시간: ' + timeLeft + '초', width - 20, 20);
      noStroke();
    }
  </script>
</body>
</html>
